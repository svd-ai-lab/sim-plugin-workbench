driver: workbench
sdk_package: ansys-workbench-core

profiles:

  # ── 24.1: SDK 0.4.x–0.9.x (0.13+ 硬编码拒绝 241) ──────────────

  - name: workbench_v24_1_sdk
    sdk: ">=0.4,<0.10"
    solver_versions: ["24.1", "24.1.0", "2024 R1"]
    active_sdk_layer: "0.4"
    active_solver_layer: "24.1"
    notes: |
      PyWorkbench SDK 0.4–0.9 + Ansys 24.1.
      SDK 0.10+ added version gate (>=242), so 24.1 requires pinned SDK.
      launch_workbench(release="241").

  # ── 24.2: SDK 0.4.x–0.13.x (全版本兼容) ─────────────────────────

  - name: workbench_v24_2_sdk
    sdk: ">=0.4,<1.0"
    solver_versions: ["24.2", "24.2.0", "2024 R2"]
    active_sdk_layer: "0.10"
    active_solver_layer: "24.2"
    notes: |
      PyWorkbench SDK 0.4+ 均支持 24.2.
      SDK 0.10+ 新增 download_project_archive(), start_sherlock_server().
      launch_workbench(release="242").

  # ── 25.1: SDK 0.10+ (推荐最新 SDK) ──────────────────────────────

  - name: workbench_v25_1_sdk
    sdk: ">=0.10,<1.0"
    solver_versions: ["25.1", "25.1.0", "2025 R1"]
    active_sdk_layer: "0.10"
    active_solver_layer: "25.1"
    notes: |
      PyWorkbench SDK 0.10+ with Ansys 25.1.
      launch_workbench(release="251").

  # ── 25.2: SDK 0.12+ ─────────────────────────────────────────────

  - name: workbench_v25_2_sdk
    sdk: ">=0.12,<1.0"
    solver_versions: ["25.2", "25.2.0", "2025 R2"]
    active_sdk_layer: "0.12"
    active_solver_layer: "25.2"
    notes: |
      PyWorkbench SDK 0.12+ with Ansys 25.2.
      launch_workbench(release="252").
